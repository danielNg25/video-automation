services:
  douyin-api:
    image: evil0ctal/douyin_tiktok_download_api:latest
    container_name: douyin-api
    ports:
      - "8081:80"
    restart: unless-stopped
    volumes:
      - ./config/douyin_web_config.yaml:/app/crawlers/douyin/web/config.yaml:ro

  app:
    build: .
    image: douyin-automation-app:latest
    container_name: douyin-app
    # Apple Silicon: comment the line below to try native arm64. Onnxruntime
    # ships aarch64 wheels but Rosetta amd64 is the well-tested path.
    platform: linux/amd64
    ports:
      - "8000:8000"
    environment:
      DOUYIN_API_BASE: http://douyin-api:80
    depends_on:
      - douyin-api
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    # RapidOCR ships its ONNX models bundled inside the python package (no
    # runtime download), so no model-cache volume is needed any more. The
    # old `paddleocr_cache` volume is orphaned and can be reclaimed with:
    #   docker volume rm douyin-automation_paddleocr_cache
    # See DOCKER.md.
