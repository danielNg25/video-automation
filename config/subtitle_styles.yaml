# Subtitle styling configuration (ASS format)
# These values map to ASS style fields
# Default font: Arial (supports English + Vietnamese diacritics)

default:
  font_name: "Arial"
  font_size: 24
  primary_color: "&H00FFFFFF"    # white
  outline_color: "&H00000000"    # black
  outline_width: 2
  shadow_depth: 1
  alignment: 2                   # bottom-center
  margin_v: 30                   # vertical margin from bottom
  margin_h: 0                    # horizontal offset in pixels
  bold: true
  background_color: ""           # empty = transparent, e.g. "&H80000000" for semi-transparent black
  background_opacity: 0          # 0-255 (ASS BackColour alpha, 0 = fully transparent)

# Per-platform overrides (merged with default)
platforms:
  tiktok:
    font_size: 28
    margin_v: 80                 # higher to avoid TikTok UI elements
  youtube:
    font_size: 22
    margin_v: 30
  facebook:
    font_size: 26
    margin_v: 40
  x:
    font_size: 22
    margin_v: 30
