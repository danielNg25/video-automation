# Global default subtitle style. Per-video overrides at
# data/srt/{video_id}_style.json deep-merge over this.
# All spatial values are PERCENTAGES of canvas dimensions
# (height for vertical fields, width for horizontal).
text:
  font_name: Arial
  font_size: 3.0
  color: '#FFFFFF'
  bold: true
position:
  alignment: bottom-center
  margin_v: 5.0
  margin_h: 0.0
outline:
  width: 0.15
  color: '#000000'
shadow:
  depth: 0.05
  color: '#000000'
background:
  shape: none
  color: '#000000'
  opacity: 0
  radius: 0.94
  padding_x: 0.83
  padding_y: 0.5
blur:
  enabled: false
  mode: blur
  strength: 15
