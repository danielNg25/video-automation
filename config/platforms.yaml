# Per-platform subtitle language and video specifications
# subtitle_language: which subtitle track to burn in (zh = Chinese, en = English)

tiktok:
  subtitle_language: zh
  max_duration: 600        # 10 minutes
  max_file_size_mb: 4096   # 4 GB
  resolution: "1080x1920"
  crf: 23
  title_max_length: 150
  hashtag_limit: 5

youtube:
  subtitle_language: en
  max_duration: null        # no limit
  max_file_size_mb: 262144  # 256 GB
  resolution: "1080x1920"
  crf: 20
  title_max_length: 100
  hashtag_limit: 15

facebook:
  subtitle_language: en
  max_duration: 900        # 15 minutes
  max_file_size_mb: 4096   # 4 GB
  resolution: "1080x1920"
  crf: 23
  title_max_length: 255
  hashtag_limit: 30

x:
  subtitle_language: en
  max_duration: 140        # 2:20
  max_file_size_mb: 512
  resolution: "1080x1920"
  crf: 26
  title_max_length: 280
  hashtag_limit: 5
