# Douyin Download API
douyin:
    api_base: '${DOUYIN_API_BASE:-http://localhost:8081}'
    cookie_file: 'config/douyin_cookie.txt'
    download_timeout: 120

# ffmpeg Processing
ffmpeg:
    default_crf: 23
    preset: 'medium'             # ultrafast, fast, medium, slow
    audio_bitrate: '128k'

# LLM Translation
# API key is NOT in this file — keys are entered in Settings → API Keys in
# the web UI, persisted to browser localStorage, and sent with each request.
translation:
    backend: 'anthropic'                    # "anthropic" | "openai" | "deepseek"
    model: 'claude-sonnet-4-20250514'       # model ID
    full_document_threshold: 100         # single LLM call up to this many segments
    chunk_size: 50                       # segments per chunk when exceeding threshold
    temperature: 0.7
    default_profile: 'funny-casual-vi'

# OCR Subtitle Extraction
ocr:
    fps: 2.0                          # Frames per second to extract
    crop_bottom_pct: 0.25             # Pre-crop to bottom 25% of frame (0 = disabled)
    confidence_threshold: 0.7         # Minimum PaddleOCR confidence
    similarity_threshold: 0.85        # SequenceMatcher ratio for dedup
    subtitle_region:
        min_y: 0.65                   # Only text below 65% of frame height
        max_watermark_frequency: 0.80 # Text in >80% of frames = watermark
        min_text_height: 0.02        # Min text height as fraction of frame
        horizontal_margin: 0.10       # Ignore text in outer 10% left/right

# TTS Dubbing
tts:
    enabled: true
    default_provider: edge              # "edge" (free), "openai", "google"
    voices_config: 'config/tts_voices.yaml'
    # Underlay level (dB) for the original-language audio mixed under the dub.
    # 0 disables the underlay entirely. Default: -12 (audible undertone).
    # Request bodies / UI settings override this value.
    underlay_db: ${TTS_UNDERLAY_DB:--12.0}

# Pipeline
pipeline:
    data_dir: './data'
    max_concurrent: 3
    retry_max_attempts: 3
    retry_base_delay: 5
    skip_existing: true
