# Douyin Download API
douyin:
    api_base: 'http://localhost:8081'
    cookie_file: 'config/douyin_cookie.txt'
    download_timeout: 120

# Whisper Transcription
whisper:
    model_size: 'large-v3'       # tiny, base, small, medium, large-v3
    device: 'auto'               # auto, cpu, cuda, mps
    compute_type: 'float16'      # float16, int8, float32
    default_language: 'zh'
    vad_filter: true
    vad_min_silence_ms: 500

# ffmpeg Processing
ffmpeg:
    default_crf: 23
    preset: 'medium'             # ultrafast, fast, medium, slow
    audio_bitrate: '128k'

# Upload Platforms
platforms:
    youtube:
        enabled: true
        credentials_file: 'config/youtube_client_secrets.json'
        token_file: 'config/youtube_token.json'
        default_privacy: 'private'
        default_category: '22'   # People & Blogs

    tiktok:
        enabled: true
        client_key: '${TIKTOK_CLIENT_KEY}'
        client_secret: '${TIKTOK_CLIENT_SECRET}'
        token_file: 'config/tiktok_token.json'
        post_mode: 'upload'      # "direct" (publish) or "upload" (draft)

    facebook:
        enabled: true
        app_id: '${FB_APP_ID}'
        app_secret: '${FB_APP_SECRET}'
        page_id: '${FB_PAGE_ID}'
        token_file: 'config/facebook_token.json'
        post_type: 'reels'       # "reels" or "feed"

    x:
        enabled: false           # Requires paid Basic plan ($100/mo)
        api_key: '${X_API_KEY}'
        api_secret: '${X_API_SECRET}'
        access_token: '${X_ACCESS_TOKEN}'
        access_secret: '${X_ACCESS_SECRET}'

# LLM Translation
translation:
    backend: 'anthropic'                    # "anthropic" | "openai"
    model: 'claude-sonnet-4-20250514'       # model ID
    api_key: '${ANTHROPIC_API_KEY}'
    max_segments_per_batch: 8
    temperature: 0.7
    default_profile: 'funny-casual-vi'

# Pipeline
pipeline:
    data_dir: './data'
    max_concurrent: 3
    retry_max_attempts: 3
    retry_base_delay: 5
    skip_existing: true
